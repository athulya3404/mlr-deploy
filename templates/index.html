<!DOCTYPE html>
<html>
<head>

<title>Multiple Linear Regression</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#36d1dc,#5b86e5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:380px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#5b86e5;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3c6fd1;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Multiple Linear Regression</h2>

<form action="/predict" method="post">

<label>Experience Years</label>
<input type="text" name="experience" placeholder="Enter experience">

<label>Education Years</label>
<input type="text" name="education" placeholder="Enter education">

<label>Monthly Hours</label>
<input type="text" name="hours" placeholder="Enter hours">

<label>Performance Score</label>
<input type="text" name="score" placeholder="Enter score">

<button type="submit">Predict Salary</button>

</form>

<div class="result">

{{ prediction_text }}

</div>

</div>

</body>
</html>
